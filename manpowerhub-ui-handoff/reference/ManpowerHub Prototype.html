<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ManpowerHub — Workforce Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/app.css">
  <link rel="stylesheet" href="docs/doc-styles.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>

  <script type="text/babel" src="docs/Invoice.jsx"></script>
  <script type="text/babel" src="docs/Quote.jsx"></script>
  <script type="text/babel" src="docs/Proposal.jsx"></script>
  <script type="text/babel" src="docs/PaymentVoucher.jsx"></script>
  <script type="text/babel" src="docs/Statement.jsx"></script>
  <script type="text/babel" src="docs/CreditNote.jsx"></script>
  <script type="text/babel" src="docs/DeliveryNote.jsx"></script>
  <script type="text/babel" src="docs/LPO.jsx"></script>
  <script type="text/babel" src="src/components/primitives.jsx"></script>
  <script type="text/babel" src="src/components/skeletons.jsx"></script>
  <script type="text/babel" src="src/components/cmdk.jsx"></script>
  <script type="text/babel" src="src/components/ai-panel.jsx"></script>

  <script type="text/babel" src="src/screens/design-system.jsx"></script>
  <script type="text/babel" src="src/screens/dashboard.jsx"></script>
  <script type="text/babel" src="src/screens/clients.jsx"></script>
  <script type="text/babel" src="src/screens/projects.jsx"></script>
  <script type="text/babel" src="src/screens/quotation-list.jsx"></script>
  <script type="text/babel" src="src/screens/quotation-detail.jsx"></script>
  <script type="text/babel" src="src/screens/quotation-form.jsx"></script>
  <script type="text/babel" src="src/screens/documents.jsx"></script>
  <script type="text/babel" src="src/screens/finance.jsx"></script>
  <script type="text/babel" src="src/screens/tasks.jsx"></script>
  <script type="text/babel" src="src/screens/time.jsx"></script>
  <script type="text/babel" src="src/screens/expenses.jsx"></script>
  <script type="text/babel" src="src/screens/settings.jsx"></script>
  <script type="text/babel" src="src/screens/login.jsx"></script>

  <script type="text/babel" src="src/app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // Wait for all babel-transpiled scripts to load
    function mount() {
      if (!window.App || !window.Screens || !window.Screens.DesignSystem) {
        return setTimeout(mount, 30);
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    }
    mount();
  </script>
</body>
</html>
